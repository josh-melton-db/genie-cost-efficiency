  sql_snippets:
    measures:
      - name: Recognized Revenue
        alias: recognized_revenue
        sql: "SUM(ol.net_recognized_amount)"
        synonyms: [revenue, sales, recognized_sales]
        usage: Default revenue measure; fulfilled lines only
      - name: Ending MRR
        alias: ending_mrr
        sql: "SUM(se.mrr_delta)"
        synonyms: [mrr, subscription revenue]
        usage: Subscription MRR movement
    filters:
      - name: Fulfilled lines only
        sql: "ol.line_status = 'FULFILLED'"
        synonyms: [fulfilled, recognized lines]
        usage: Always apply for revenue
      - name: EMEA region
        sql: "g.region_code = 'EMEA'"
        synonyms: [emea, europe middle east africa]
        usage: EMEA geo filter
    fields:
      - name: Fiscal Year
        alias: fiscal_year
        sql: "d.fiscal_year"
        synonyms: [fy, fiscal_yr]
      - name: Fiscal Month
        alias: fiscal_month
        sql: "d.fiscal_month"
        synonyms: [fm, month]
      - name: Product Family
        alias: product_family
        sql: "p.product_family"
        synonyms: [family, device family]

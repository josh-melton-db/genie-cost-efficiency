tier: T8
name: join_relationships_only
axis: joins
lever: join_specs
intent: Join relationships (keys + relationship type) only — no examples or MV
data_objects:
  - ${catalog}.${schema}.dim_member
  - ${catalog}.${schema}.dim_product
  - ${catalog}.${schema}.dim_campaign
  - ${catalog}.${schema}.dim_geo
  - ${catalog}.${schema}.dim_date
  - ${catalog}.${schema}.fact_order
  - ${catalog}.${schema}.fact_order_line
  - ${catalog}.${schema}.fact_subscription_event
  - ${catalog}.${schema}.fact_usage_event
  - ${catalog}.${schema}.fact_return
description: ""
sample_questions: []
instructions:
  text: ""
  example_sqls: []
  join_specs:
    - left: ${catalog}.${schema}.fact_order_line
      left_alias: ol
      right: ${catalog}.${schema}.dim_date
      right_alias: d
      sql: "`ol`.`recognition_date_key` = `d`.`date_key`"
      relationship_type: many_to_one
      instruction: Use for recognition-dated revenue
    - left: ${catalog}.${schema}.fact_order_line
      left_alias: ol
      right: ${catalog}.${schema}.dim_geo
      right_alias: g
      sql: "`ol`.`geo_key` = `g`.`geo_key`"
      relationship_type: many_to_one
    - left: ${catalog}.${schema}.fact_order_line
      left_alias: ol
      right: ${catalog}.${schema}.dim_product
      right_alias: p
      sql: "`ol`.`product_key` = `p`.`product_key`"
      relationship_type: many_to_one
    - left: ${catalog}.${schema}.fact_order_line
      left_alias: ol
      right: ${catalog}.${schema}.dim_member
      right_alias: m
      sql: "`ol`.`member_key` = `m`.`member_key`"
      relationship_type: many_to_one
    - left: ${catalog}.${schema}.fact_order_line
      left_alias: ol
      right: ${catalog}.${schema}.dim_campaign
      right_alias: c
      sql: "`ol`.`campaign_key` = `c`.`campaign_key`"
      relationship_type: many_to_one
    - left: ${catalog}.${schema}.fact_subscription_event
      left_alias: se
      right: ${catalog}.${schema}.dim_campaign
      right_alias: c
      sql: "`se`.`attribution_campaign_key` = `c`.`campaign_key`"
      relationship_type: many_to_one
  sql_snippets:
    measures: []
    filters: []
